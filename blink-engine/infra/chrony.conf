# ============================================================================
# Chrony Configuration — Microsecond-Level Time Synchronization
# Owner: AURA-1 (Lead Systems Architect)
#
# Install: cp chrony.conf /etc/chrony/chrony.conf && systemctl restart chrony
# Verify:  chronyc tracking && chronyc sources -v
# ============================================================================

# ── NTP Servers (multiple sources for redundancy) ─────────
# Use iburst for fast initial sync, minpoll/maxpoll for aggressive polling
server 0.pool.ntp.org        iburst minpoll 1 maxpoll 4
server 1.pool.ntp.org        iburst minpoll 1 maxpoll 4
server 2.pool.ntp.org        iburst minpoll 1 maxpoll 4
server 3.pool.ntp.org        iburst minpoll 1 maxpoll 4

server time.google.com       iburst minpoll 1 maxpoll 4 prefer
server time.cloudflare.com   iburst minpoll 1 maxpoll 4

# AWS time source (if running on EC2 — zero network hop)
server 169.254.169.123       iburst minpoll 1 maxpoll 4 prefer

# ── Hardware Timestamping ─────────────────────────────────
# Enable NIC hardware timestamps on eth0 for sub-microsecond accuracy.
# The NIC must support SO_TIMESTAMPING / PTP hardware clock.
hwtimestamp eth0

# Fallback: enable on all interfaces if eth0 is not the primary
# hwtimestamp *

# ── Step & Drift Correction ──────────────────────────────
# Allow large clock step (up to 1 second) during first 3 updates after boot.
# After initial sync, only slew — never step (deterministic for HFT).
makestep 1.0 3

# Maximum acceptable distance to a time source (seconds)
# Reject sources with root distance > 1.0s
maxdistance 1.0

# ── Local Clock Fallback ─────────────────────────────────
# If all NTP sources are lost, continue serving time at stratum 10
# so downstream clients (monitoring, etc.) still get a reference.
local stratum 10

# ── RTC Sync ─────────────────────────────────────────────
# Sync the hardware RTC every 11 minutes
rtcsync

# ── Logging ──────────────────────────────────────────────
logdir /var/log/chrony
log tracking measurements statistics

# ── Drift File ───────────────────────────────────────────
driftfile /var/lib/chrony/chrony.drift

# ── Access Control ───────────────────────────────────────
# Only allow localhost to query chrony
allow 127.0.0.1
deny all

# ── Temp Compensation ────────────────────────────────────
# Lock memory to prevent chrony from being swapped out
lock_all
