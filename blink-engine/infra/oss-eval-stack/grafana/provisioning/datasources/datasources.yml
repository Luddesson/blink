apiVersion: 1

datasources:
  - name: Blink Prometheus
    uid: blink-prom
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Blink ClickHouse
    uid: blink-clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    jsonData:
      host: clickhouse
      port: 8123
      protocol: http
      username: default
      defaultDatabase: blink
    secureJsonData:
      password: ""
    editable: true
