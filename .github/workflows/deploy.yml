name: Deploy to Hetzner

on:
  push:
    branches: [master]
    paths:
      - 'blink-engine/**'
      - 'blink-ui/**'
      - 'deploy/hetzner/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: hetzner-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build UI + rebuild engine on server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HETZNER_HOST: 5.161.100.38
      HETZNER_USER: root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy secret
        id: deploy_guard
        shell: bash
        run: |
          if [ -z "${{ secrets.HETZNER_SSH_KEY }}" ]; then
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Hetzner deploy: missing GitHub secret HETZNER_SSH_KEY."
            echo "::notice::Set HETZNER_SSH_KEY in Settings -> Secrets and variables -> Actions to enable deployment."
          else
            echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blink-ui/package-lock.json

      # Build the UI in CI so the server doesn't need node/npm, and commit hashes
      # stay deterministic. Output goes into blink-engine/static/ui which is what
      # the engine's web_server serves.
      - name: Build web UI
        working-directory: blink-ui
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Verify UI built
        run: |
          test -f blink-engine/static/ui/index.html
          ls -lh blink-engine/static/ui/assets/ | head -20

      - name: Setup SSH
        if: steps.deploy_guard.outputs.deploy_enabled == 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "${{ secrets.HETZNER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            echo "::error::HETZNER_SSH_KEY is not a valid private key."
            echo "::error::Ensure the key is complete and in OpenSSH/PEM private key format."
            exit 1
          fi
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || {
            echo "::error::Failed to fetch SSH host key for $HETZNER_HOST."
            exit 1
          }
          chmod 644 ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=10 \
            "$HETZNER_USER@$HETZNER_HOST" "echo 'SSH connectivity OK'" >/dev/null

      # rsync the freshly-built UI assets up so we don't rely on the server
      # checking them out of git.
      - name: Push built UI to server
        if: steps.deploy_guard.outputs.deploy_enabled == 'true'
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes" \
            blink-engine/static/ui/ \
            "$HETZNER_USER@$HETZNER_HOST:/opt/blink/static/ui/"

      - name: Pull latest + rebuild engine + restart services
        if: steps.deploy_guard.outputs.deploy_enabled == 'true'
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes "$HETZNER_USER@$HETZNER_HOST" 'bash -se' <<'REMOTE'
          set -euo pipefail
          BLINK_DIR=/opt/blink
          cd $BLINK_DIR/src

          echo "── git sync ──"
          sudo -u blink git fetch origin --prune
          sudo -u blink git reset --hard origin/master
          sudo -u blink git log -1 --oneline

          echo "── engine build ──"
          source /root/.cargo/env
          cd $BLINK_DIR/src/blink-engine
          cargo build --release -p engine 2>&1 | tail -8

          echo "── install binary + sidecar ──"
          install -m755 $BLINK_DIR/src/blink-engine/target/release/engine $BLINK_DIR/engine
          rsync -a --delete $BLINK_DIR/src/blink-engine/alpha-sidecar/ $BLINK_DIR/alpha-sidecar/
          if [ -x "$BLINK_DIR/sidecar-venv/bin/pip" ]; then
            $BLINK_DIR/sidecar-venv/bin/pip install -q -e $BLINK_DIR/alpha-sidecar/ || true
          fi
          chown -R blink:blink $BLINK_DIR

          echo "── restart services ──"
          systemctl restart blink-engine
          sleep 3
          systemctl restart blink-sidecar || true

          echo "── health ──"
          sleep 4
          systemctl is-active blink-engine
          systemctl is-active blink-sidecar || true
          curl -sf http://127.0.0.1:3030/api/status >/dev/null && echo "engine API ok" || echo "engine API not responding yet"
          REMOTE

      - name: Cleanup SSH key
        if: always() && steps.deploy_guard.outputs.deploy_enabled == 'true'
        run: rm -f ~/.ssh/id_ed25519
