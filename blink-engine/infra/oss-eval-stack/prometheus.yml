global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: blink-http-endpoints
    metrics_path: /probe
    params:
      module: [http_2xx_json]
    static_configs:
      - targets:
          - http://host.docker.internal:3030/health
          - http://host.docker.internal:3030/api/status
          - http://host.docker.internal:3030/api/metrics
          - http://host.docker.internal:3030/api/gates
        labels:
          service: blink-engine
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:9464
